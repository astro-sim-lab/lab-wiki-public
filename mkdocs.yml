site_name: Laboratory Wiki (Public)
site_description: 研究室の生活・ルールに関するWiki
repo_url: https://github.com/shingohirano-astro/lab-wiki-public
repo_name: lab-wiki-public
edit_uri: edit/main/docs/

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

docs_dir: docs
site_dir: site

nav:
  - Home: README.md
  - オンボーディング: onboarding.md
  - 年間スケジュール: schedule_yearly.md
  - 週間スケジュール: schedule_weekly.md
  - メンバー情報: members.md
  - GitHub / Discordの使い方: communication_tools.md
  - 卒研要件: bachelor_requirements.md
  - 卒業生アーカイブ: alumni_archive.md
  - 研究室機材・リソース: resources.md
  - 初学者向けリンク集: learning_links.md
  - 連絡・対応の優先度ルール: contact_priority.md
  - 施設・安全情報: safety_and_facility.md
  - データ管理方針: data_management.md
  - 研究倫理・剽窃・AI利用ガイドライン: research_ethics_ai.md
  - 学会/発表/提出フロー: submission_flow.md
  - 運用ルール: operations.md
  - FAQ: faq.md
  - テンプレート:
      - 進捗報告テンプレート: page_templates/meeting-note.md
      - 締切逆算テンプレート: page_templates/deadline-backward-plan.md
