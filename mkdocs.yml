site_name: Laboratory Wiki (Public)
site_description: 研究室の生活・ルールに関するWiki
repo_url: https://github.com/shingohirano-astro/lab-wiki-public
repo_name: lab-wiki-public
edit_uri: edit/main/docs/public/

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

docs_dir: docs/public
site_dir: site

nav:
  - Home: README.md
  - 研究紹介: research_overview.md
  - 最近の成果: news.md
  - 年間スケジュール: schedule_yearly.md
  - 週間スケジュール: schedule_weekly.md
  - メンバー情報: members.md
  - 卒業生アーカイブ: alumni_archive.md
  - 初学者向けリンク集: learning_links.md
